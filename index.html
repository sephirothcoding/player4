<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Container Stea cu 6 Colțuri</title>
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f0f0f0;
  }

  .container {
    width: 500px;
    height: 500px;
    position: relative;
    background-color: #ddd; /* Schimbă culoarea de fundal aici */
    clip-path: polygon(
      50% 0%,
      61.8% 20.5%,
      95% 20.5%,
      70% 40%,
      80% 95%,
      50% 70%,
      20% 95%,
      30% 40%,
      5% 20.5%,
      38.2% 20.5%
    );
  }
</style>
</head>
<body>
<div class="container">
  <!-- Introdu aici conținutul containerului, dacă este necesar -->
</div>
</body>
</html>
