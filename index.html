<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Container Stea Hexagonală</title>
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f0f0f0;
  }

  .container {
    width: 500px;
    height: 500px;
    position: relative;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background-color: #ddd; /* Schimbă culoarea de fundal aici */
  }
</style>
</head>
<body>
<div class="container">
  <!-- Introdu aici conținutul containerului, dacă este necesar -->
</div>
</body>
</html>
