<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Container Stea cu 6 Colțuri</title>
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f0f0f0;
  }

  .container {
    width: 500px;
    height: 500px;
    position: relative;
    background-color: #ddd; /* Schimbă culoarea de fundal aici */
    clip-path: polygon(
      50% 0%,
      72.5% 26.6%,
      100% 50%,
      72.5% 73.4%,
      50% 100%,
      27.5% 73.4%,
      0% 50%,
      27.5% 26.6%
    );
  }
</style>
</head>
<body>
<div class="container">
  <!-- Introdu aici conținutul containerului, dacă este necesar -->
</div>
</body>
</html>
